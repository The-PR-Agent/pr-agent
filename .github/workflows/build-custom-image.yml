name: Build custom image

on:
  push:
    branches:
      - gsd/v1.0-milestone
  workflow_dispatch:
    inputs:
      target:
        description: Docker target to build
        required: true
        default: gitlab_webhook
        type: choice
        options:
          - cli
          - gitlab_webhook
          - github_app
          - github_action
      tag:
        description: Image tag
        required: true
        default: dev

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve build inputs
        id: build
        shell: bash
        run: |
          target="${{ github.event_name == 'workflow_dispatch' && inputs.target || 'gitlab_webhook' }}"
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || '' }}"
          if [ -z "$tag" ]; then
            safe_ref="$(printf '%s' "$GITHUB_REF_NAME" | tr '/[:upper:]' '-[:lower:]')"
            tag="${safe_ref}-${GITHUB_SHA::7}"
          fi
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          echo "image=ghcr.io/${owner}/pr-agent:${tag}" >> "$GITHUB_OUTPUT"
          echo "target_name=${target}" >> "$GITHUB_OUTPUT"
          if [ "$target" = "github_action" ]; then
            echo "file=Dockerfile.github_action" >> "$GITHUB_OUTPUT"
            echo "target=" >> "$GITHUB_OUTPUT"
          else
            echo "file=docker/Dockerfile" >> "$GITHUB_OUTPUT"
            echo "target=${target}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.build.outputs.file }}
          target: ${{ steps.build.outputs.target }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.build.outputs.image }}
          cache-from: type=gha,scope=custom-${{ steps.build.outputs.target_name }}
          cache-to: type=gha,mode=max,scope=custom-${{ steps.build.outputs.target_name }}
